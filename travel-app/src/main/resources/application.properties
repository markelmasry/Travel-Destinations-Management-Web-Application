# --- Core Application ---
spring.application.name=travel-app
server.port=8080

# --- Security ---
application.security.jwt.secret-key=${JWT_SECRET}

# --- External APIs ---
restcountries.api.base-url=https://api.restcountries.com/countries/v5/name
restcountries.api.key=${REST_COUNTRIES_API_KEY}

# --- MySql Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/travel_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
# --- JPA / Hibernate ---
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true